name: Integration test

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "src/datadoc_editor/**"
      - "uv.lock"
      - ".nais/test-pr.yaml"
      - ".github/workflows/integration-test.yml"
      - "gunicorn.conf.py"

env:
  REGISTRY: europe-north1-docker.pkg.dev/nais-management-b3a7/dapla-metadata
  IMAGE: datadoc
  TAG: ${{ github.head_ref }}-${{ github.sha }}

jobs:
  docker-build:
    name: Docker build
    permissions:
      contents: "read"
      id-token: "write"
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.metadata.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Authenticate to Google Cloud"
        id: "auth"
        uses: "google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093" # v3.0.0
        with:
          workload_identity_provider: "projects/906675412832/locations/global/workloadIdentityPools/ssb-identity-pool/providers/github-oidc-provider"
          service_account: "gh-ssb@nais-management-b3a7.iam.gserviceaccount.com"
          token_format: "access_token"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: "oauth2accesstoken"
          password: "${{ steps.auth.outputs.access_token }}"

      - name: Docker meta
        id: metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          # Docker tags based on the following events/attributes
          tags: |
            type=sha

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

      - name: Output image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  deploy:
    name: Deploy to NAIS
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # v2
        env:
          CLUSTER: test
          RESOURCE: .nais/test-pr.yaml
          VAR: image=${{ needs.docker-build.outputs.image-tag }},pr-number=${{github.event.number}}
          DEPLOY_SERVER: deploy.ssb.cloud.nais.io:443

  mabl-test:
    name: Run mabl tests
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: Run mabl tests
        id: mabl-test-deployment
        uses: mablhq/github-run-tests-action@e46db148f0124be267acff561cd4d9303375852a # v1
        env:
          # Use a "CI/CD Integration" type of mabl API key
          MABL_API_KEY: ${{ secrets.MABL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          application-id: ${{ secrets.DATADOC_MABL_APPLICATION_ID }}
          environment-id: ${{ secrets.DATADOC_MABL_ENVIRONMENT_ID }}
          app-url: https://datadoc-pr-${{github.event.number}}.test.ssb.no
          mabl-branch: ${{ github.head_ref }}
          plan-labels: Datadoc
