name: Integration test

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "src/datadoc_editor/**"
      - "uv.lock"
      - ".nais/test-pr.yaml"
      - ".github/workflows/integration-test.yml"
      - "gunicorn.conf.py"

env:
  REGISTRY: europe-north1-docker.pkg.dev/nais-management-b3a7/dapla-metadata
  IMAGE: datadoc
  TAG: ${{ github.head_ref }}-${{ github.sha }}

jobs:
  docker-build:
    name: Docker build
    permissions:
      contents: "read"
      id-token: "write"
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.metadata.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Authenticate to Google Cloud"
        id: "auth"
        uses: "google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093" # v3.0.0
        with:
          workload_identity_provider: "projects/906675412832/locations/global/workloadIdentityPools/ssb-identity-pool/providers/github-oidc-provider"
          service_account: "gh-ssb@nais-management-b3a7.iam.gserviceaccount.com"
          token_format: "access_token"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: "oauth2accesstoken"
          password: "${{ steps.auth.outputs.access_token }}"

      - name: Docker meta
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          # Docker tags based on the following events/attributes
          tags: |
            type=sha

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

      - name: Output image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  deploy:
    name: Deploy to NAIS
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: nais/deploy/actions/deploy@157203210ef983b1d2fb32db50d177043ce95ebd # v2
        env:
          CLUSTER: test
          RESOURCE: .nais/test-pr.yaml
          VAR: image=${{ needs.docker-build.outputs.image-tag }},pr-number=${{github.event.number}}
          DEPLOY_SERVER: deploy.ssb.cloud.nais.io:443

  mabl-test:
    name: Run mabl tests
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: Run mabl tests
        id: mabl-test-deployment
        uses: mablhq/github-run-tests-action@43061c6f3eeabd3dbd2c6c045c8e307b231f4427 # v1
        env:
          # Use a "CI/CD Integration" type of mabl API key
          MABL_API_KEY: ${{ secrets.MABL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          application-id: ${{ secrets.DATADOC_MABL_APPLICATION_ID }}
          environment-id: ${{ secrets.DATADOC_MABL_ENVIRONMENT_ID }}
          app-url: https://datadoc-pr-${{github.event.number}}.test.ssb.no
          mabl-branch: ${{ github.head_ref }}
          plan-labels: Datadoc
